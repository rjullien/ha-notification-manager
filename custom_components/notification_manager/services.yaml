notify:
  name: Send Notification
  description: >
    Envoie des notifications multicanal : téléphone (push + Telegram),
    Alexa TTS (avec sauvegarde/restauration du volume), et WhatsApp
    via whatsmeow-bridge. Remplace le script ManageTTS avec 100%
    de compatibilité ascendante.
  fields:
    message_tel:
      name: Message téléphone / Telegram
      description: >
        Message envoyé aux notifications push et à Telegram.
        Utilisé également pour WhatsApp.
      example: "Bonne nuit tout le monde !"
      required: false
      selector:
        text:
          multiline: true

    message_alexa:
      name: Message Alexa (français)
      description: >
        Message TTS envoyé aux enceintes Alexa en français.
      example: "Bonne nuit, fermez les volets !"
      required: false
      selector:
        text:
          multiline: true

    message_alexa_en:
      name: Message Alexa (anglais)
      description: >
        Message TTS envoyé à l'Echo anglais (media_player.jullien_s_echo)
        avec un délai de 3 secondes.
      example: "Good night everyone!"
      required: false
      selector:
        text:
          multiline: true

    notification_tel:
      name: Destinataires téléphone
      description: >
        Destinataires des notifications push et Telegram.
        Valeurs possibles : Rene, Nicole, Camille, Marie (séparés par espace).
        Défaut = all (Rene + Nicole). Désactiver = aucun ou none.
      example: "Rene Nicole"
      required: false
      default: "all"
      selector:
        text:

    notification_whatsapp:
      name: Destinataires WhatsApp
      description: >
        Destinataires WhatsApp via whatsmeow-bridge.
        Valeurs possibles : Rene, Nicole, Camille, Nadia, Claire, Jihane, Tristan
        (séparés par espace). Défaut = none (désactivé).
      example: "Rene Nicole"
      required: false
      default: "none"
      selector:
        text:

    notification_alexa:
      name: Enceintes Alexa
      description: >
        Enceintes Alexa cibles pour le TTS. Chaque mot-clé est matché
        par sous-chaîne dans l'entity_id.
        Mots-clés : player, echo, show_2, chambre, spot, jardin, sdb,
        marguerite, rene, dot_2 (séparés par espace).
        Défaut (vide) = show. Désactiver = aucun.
      example: "show_2 chambre"
      required: false
      default: ""
      selector:
        text:

    telegram_group:
      name: Groupe Telegram
      description: >
        Nom du groupe Telegram cible (défini dans la configuration).
        Le message sera envoyé au groupe au lieu des DMs individuels.
      example: "rene_nicole"
      required: false
      default: ""
      selector:
        text:

    photo_path:
      name: Photo (chemin local)
      description: >
        Chemin local vers une image à envoyer via Telegram (send_photo).
        Compatible avec les DMs individuels et les groupes.
      example: "/config/www/snapshots/piscine.jpg"
      required: false
      default: ""
      selector:
        text:

    photo_url:
      name: Photo (URL)
      description: >
        URL d'une image à envoyer via Telegram.
        Alternative à photo_path pour les images distantes.
      example: "https://example.com/snapshot.jpg"
      required: false
      default: ""
      selector:
        text:

    parse_mode:
      name: Parse mode Telegram
      description: >
        Mode de parsing pour les messages Telegram.
        Permet le formatage HTML ou Markdown dans les messages.
      example: "html"
      required: false
      default: ""
      selector:
        select:
          options:
            - value: ""
              label: "Aucun (texte brut)"
            - value: "html"
              label: "HTML"
            - value: "markdown"
              label: "Markdown"

whatsapp_bridge_logs:
  name: "WhatsApp Bridge Logs"
  description: "Fetch recent logs from the WhatsApp bridge (response-only, no state stored)"
  fields:
    limit:
      name: "Limit"
      description: "Maximum number of log entries to return"
      required: false
      default: 100
      example: 50
      selector:
        number:
          min: 1
          max: 500
    level:
      name: "Level"
      description: "Filter by log level (error, warn, info). Empty = all levels"
      required: false
      default: ""
      example: "error"
      selector:
        select:
          options:
            - ""
            - "error"
            - "warn"
            - "info"

whatsapp_bridge_restart:
  name: "WhatsApp Bridge Restart"
  description: "Trigger a soft restart of the WhatsApp bridge (disconnect + reconnect)"
